    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        // ใช้ sessionStorage เพื่อป้องกัน infinite reload loop
        const SW_RELOAD_KEY = 'sw_reload_timestamp';
        const RELOAD_COOLDOWN = 5000; // 5 วินาที

        window.addEventListener('load', async () => {
          try {
            // ตรวจสอบว่า reload บ่อยเกินไปหรือไม่
            const lastReload = sessionStorage.getItem(SW_RELOAD_KEY);
            const now = Date.now();

            if (lastReload && (now - parseInt(lastReload)) < RELOAD_COOLDOWN) {
              console.log('⚠️ Reload too frequent, skipping SW operations');
              return;
            }

            // 🆕 REGISTER SERVICE WORKER
            const registration = await navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' });
            console.log('✅ SW registered:', registration);

            // ตรวจสอบอัปเดททุก 60 วินาที
            setInterval(() => {
              registration.update();
            }, 60000);

            // เมื่อมี SW ใหม่พร้อม
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              if (!newWorker) return;

              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('🆕 New Service Worker available');
                  // ถ้ากำลังลงนามอยู่ ให้เก็บไว้ก่อน ไม่ SKIP_WAITING ทันที
                  if (window.__signingInProgress) {
                    console.log('⏳ Signing in progress, deferring SW update...');
                    window.__pendingSWUpdate = newWorker;
                    return;
                  }
                  // บันทึกเวลาก่อน reload
                  sessionStorage.setItem(SW_RELOAD_KEY, Date.now().toString());
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });

            // เมื่อ SW ถูกเปลี่ยนแล้ว ให้รีโหลดหน้า (เพียงครั้งเดียว)
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              // ถ้ากำลังลงนามอยู่ ไม่ reload ทันที
              if (window.__signingInProgress) {
                console.log('⏳ Signing in progress, deferring reload...');
                window.__pendingSWReload = true;
                return;
              }
              if (!refreshing) {
                refreshing = true;
                console.log('🔄 Controller changed, reloading...');
                // บันทึกเวลาก่อน reload
                sessionStorage.setItem(SW_RELOAD_KEY, Date.now().toString());
                window.location.reload();
              }
            });

          } catch (error) {
            console.error('SW setup failed:', error);
          }
        });
      }
    </script>
